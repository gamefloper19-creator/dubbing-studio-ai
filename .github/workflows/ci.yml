name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gradio edge-tts psutil google-generativeai pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Verify all imports
        run: python -c "from dubbing_studio.pipeline import DubbingPipeline, PIPELINE_STAGES; print(f'Pipeline OK: {len(PIPELINE_STAGES)} stages')"
